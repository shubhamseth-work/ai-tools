# ============================================================
# GitLab CI/CD Pipeline — Node.js + Firebase Firestore
# Environments: development → release → production
# ============================================================
 
image: node:20-alpine    # Docker image for all jobs
 
# Define pipeline stages (execute IN ORDER)
stages:
  - install
  - lint
  - test
  - build
  - deploy-dev
  - deploy-release
  - deploy-prod
 
# Cache node_modules between jobs (saves download time)

cache:
  key: ${CI_COMMIT_REF_SLUG}
  paths:
    - node_modules/
 
variables:
  NODE_ENV: test
  APP_VERSION: ${CI_COMMIT_SHORT_SHA}    # Git commit hash as version
 
# ─── STAGE 1: INSTALL ───
install:dependencies:
  stage: install
  script:
    - echo 'Installing dependencies...'
    - npm ci    # clean install — faster than npm install
  artifacts:
    paths:
      - node_modules/
    expire_in: 1 hour
 
# ─── STAGE 2: LINT ───
lint:eslint:
  stage: lint
  script:
    - npm ci
    - npx eslint . --max-warnings=0
    - npx eslint src/ --ext .js --format stylish || true

  allow_failure: true    # Lint won't block pipeline
 
# ─── STAGE 3: TEST ───
test:unit:
  stage: test
  script:
    - npm run test:unit
  coverage: '/Lines\s*:\s*(\d+\.?\d*)%/'
  artifacts:
    when: always
    paths:
      - coverage/
    expire_in: 7 days
 
test:integration:
  stage: test
  script:
    - npm run test:integration
 
# ─── STAGE 4: BUILD ───
build:artifact:
  stage: build
  script:

    - |
      cat > src/version.json << EOF
      {
        "version": "${CI_COMMIT_SHORT_SHA}",
        "branch": "${CI_COMMIT_REF_NAME}",
        "pipeline": "${CI_PIPELINE_ID}"
      }
      EOF
  artifacts:
    paths:
      - src/
      - package.json
    expire_in: 1 week
  only:
    - main
    - develop
 
# ─── STAGE 5: DEPLOY — DEVELOPMENT (auto) ───
deploy:development:
  stage: deploy-dev
  environment:
    name: development
    url: https://myapp-dev.yourdomain.com
  variables:
    NODE_ENV: development
    FIREBASE_PROJECT_ID: ${DEV_FIREBASE_PROJECT_ID}
    FIREBASE_SERVICE_ACCOUNT_JSON: ${DEV_SERVICE_ACCOUNT_JSON}
  before_script:
    - npm install -g firebase-tools
  script:
    - npm ci
    - firebase use ${FIREBASE_PROJECT_ID} --token ${FIREBASE_TOKEN}
    - firebase deploy --only firestore:rules --project ${FIREBASE_PROJECT_ID} --token ${FIREBASE_TOKEN}
  only:
    - develop
  rules:
    - if: '$CI_COMMIT_BRANCH =~ /^(dev|development|sandbox)$/ && $CI_PIPELINE_SOURCE == "merge_request_event"'
 
# ─── STAGE 6: DEPLOY — RELEASE (auto) ───
deploy:release:
  stage: deploy-release
  environment:
    name: release
    url: https://myapp-release.yourdomain.com
  variables:
    NODE_ENV: release
    FIREBASE_PROJECT_ID: ${RELEASE_FIREBASE_PROJECT_ID}
    FIREBASE_SERVICE_ACCOUNT_JSON: ${RELEASE_SERVICE_ACCOUNT_JSON}
  before_script:

    - npm install -g firebase-tools
  script:
    - npm ci
    - firebase use ${FIREBASE_PROJECT_ID} --token ${FIREBASE_TOKEN}
    - firebase deploy --only firestore:rules --project ${FIREBASE_PROJECT_ID} --token ${FIREBASE_TOKEN}
  rules:
    - if: '$CI_COMMIT_BRANCH =~ /^(rel|release|nonprod)$/ && $CI_PIPELINE_SOURCE == "merge_request_event"'


 
# ─── STAGE 7: DEPLOY — PRODUCTION (MANUAL ONLY) ───
deploy:production:
  stage: deploy-prod
  environment:
    name: production
    url: https://myapp.yourdomain.com
  variables:
    NODE_ENV: production
    FIREBASE_PROJECT_ID: ${PROD_FIREBASE_PROJECT_ID}
    FIREBASE_SERVICE_ACCOUNT_JSON: ${PROD_SERVICE_ACCOUNT_JSON}
  when: manual              # ← Human must click Play button in GitLab UI
  allow_failure: false      # Production failure stops everything
  before_script:
    - npm install -g firebase-tools
  script:
    - npm ci
    - firebase use ${FIREBASE_PROJECT_ID} --token ${FIREBASE_TOKEN}
    - firebase deploy --only firestore:rules --project ${FIREBASE_PROJECT_ID} --token ${FIREBASE_TOKEN}
  only:
    - main    # Only from main branch

